name: grummage
version: '2.0.0'
summary: Interactive terminal frontend for Grype to view vulnerabilities.
description: |
  Grummage is an interactive terminal frontend for viewing vulnerabilities.
  Grummage requires the availability of Grype to process a Software Bill of
  Materials (SBOM) file and render the resulting vulnerability data.
  It provides a consistent, user-friendly way to view and explore vuln
  data with keyboard navigation and multiple view modes.

base: core24
confinement: strict
grade: stable

platforms:
  amd64:
  arm64:
  ppc64el:
  s390x:

apps:
  grummage:
    command: bin/grummage
    plugs:
      - home
      - removable-media
      - network

parts:
  grummage:
    plugin: python
    source: .
    python-packages:
      - .
    build-packages:
      - ca-certificates
      - curl
    override-build: |
      craftctl default
      GRYPE_VERSION=0.111.0
      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64) GRYPE_ARCH=amd64 ;;
        arm64) GRYPE_ARCH=arm64 ;;
        ppc64el) GRYPE_ARCH=ppc64le ;;
        s390x) GRYPE_ARCH=s390x ;;
        *) echo "Unsupported snap architecture: $CRAFT_ARCH_BUILD_FOR" >&2; exit 1 ;;
      esac
      BASE_URL="https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}"
      ARCHIVE="grype_${GRYPE_VERSION}_linux_${GRYPE_ARCH}.tar.gz"
      curl -fsSLO "${BASE_URL}/grype_${GRYPE_VERSION}_checksums.txt"
      curl -fsSLO "${BASE_URL}/${ARCHIVE}"
      grep " ${ARCHIVE}$" "grype_${GRYPE_VERSION}_checksums.txt" | sha256sum -c -
      tar -xzf "${ARCHIVE}" grype
      install -Dm755 grype "$CRAFT_PART_INSTALL/usr/bin/grype"
